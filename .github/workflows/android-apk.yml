name: Build Android debug APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "android_app/**"
      - ".github/workflows/android-apk.yml"
  pull_request:
    paths:
      - "android_app/**"
      - ".github/workflows/android-apk.yml"

permissions:
  contents: read

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
          cache-dependency-path: android_app

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK 34 components
        run: sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Build debug APK
        working-directory: android_app
        run: sh gradlew :app:assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: nemo-assistant-debug-apk
          path: android_app/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 14
